<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      color: #333;
    }

    form {
      margin-top: 20px;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    div {
      margin: 12px 0;
    }

    main {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>

<body>
  <main>
    <h1>Assistente de Saúde da Mulher</h1>
    <p>Este é um exemplo de um assistente de saúde da mulher que pode ajudar em questões relacionadas ao pré-natal,
      pós-parto e violência doméstica.
      Ele utiliza uma abordagem baseada em agentes para fornecer informações e suporte personalizados.</p>

    <form action="/" method="post">
      <div>
        <input type="text" placeholder="Digite sua consulta aqui..." style="width: 300px;">
      </div>
      <div>
        <input type="file" name="file" style="margin-top: 10px;" placeholder="Selecione um arquivo para analise">
      </div>

      <div>
        <button type="submit">Enviar</button>
      </div>
    </form>
  </main>
</body>

<script>
  const form = document.querySelector("form");

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const input = form.querySelector("input");
    const query = input.value;

    try {
      const response = await fetch("http://localhost:3000/query", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ query }),
      });

      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = response.json();

      alert(`Resposta do assistente: ${data.answer}`);
    } catch (error) {
      console.error("Error fetching assistant response:", error.message);
      alert("Ocorreu um erro ao obter a resposta do assistente.");
    }
  });
</script>

</html>
