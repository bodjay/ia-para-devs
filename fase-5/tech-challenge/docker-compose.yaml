services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_MAX_SESSION_TIMEOUT: 60000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 30000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 20000
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 600000
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongo:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (optional — start with: docker compose --profile ollama up) ──────

  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  # ─── AI Agents (Kafka-native workers) ────────────────────────────────────────

  orchestrator-agent:
    build:
      context: .
      dockerfile: packages/orchestrator-agent/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  diagram-extraction-agent:
    build:
      context: .
      dockerfile: packages/diagram-extraction-agent/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      PROCESSING_SERVICE_URL: http://processing-service:3001
    depends_on:
      kafka:
        condition: service_healthy
      processing-service:
        condition: service_started
    restart: unless-stopped

  architecture-analysis-agent:
    build:
      context: .
      dockerfile: packages/architecture-analysis-agent/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Backend Services ─────────────────────────────────────────────────────

  bff:
    build:
      context: .
      dockerfile: packages/bff/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/arch-analyzer-bff
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  upload-service:
    build:
      context: .
      dockerfile: packages/upload-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/arch-analyzer-uploads
      KAFKA_BROKERS: kafka:9092
      UPLOAD_DIR: /app/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      UPLOAD_SERVICE_PUBLIC_URL: ${UPLOAD_SERVICE_PUBLIC_URL:-http://upload-service:3002}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  processing-service:
    build:
      context: .
      dockerfile: packages/processing-service/Dockerfile
    environment:
      MONGO_URI: mongodb://mongo:27017/arch-analyzer-processing
      KAFKA_BROKERS: kafka:9092
      EXTRACTION_AGENT_URL: http://diagram-extraction-agent:3003
      EXTRACTION_AGENT_TIMEOUT_MS: 360000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build:
      context: .
      dockerfile: packages/report-service/Dockerfile
    environment:
      MONGO_URI: mongodb://mongo:27017/arch-analyzer-reports
      KAFKA_BROKERS: kafka:9092
      ANALYSIS_AGENT_URL: http://architecture-analysis-agent:3004
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        REACT_APP_BFF_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  mongo-data:
  uploads-data:
  ollama-data:
